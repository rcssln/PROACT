services:
  db:
    image: postgres:16-alpine
    container_name: proact_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proact}
      POSTGRES_USER: ${POSTGRES_USER:-proact_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proact_secret}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - proact_network
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proact_user} -d ${POSTGRES_DB:-proact}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proact_backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-proact}
      DB_USER: ${POSTGRES_USER:-proact_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-proact_secret}
      JWT_SECRET: ${JWT_SECRET:-wakin123}
      CLIENT_URL: http://localhost:3001
      BREVO_API_KEY: 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
      BREVO_SENDER_EMAIL: crtpatongan@gmail.com
      BREVO_SENDER_NAME: DOST DRRMO
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proact_network
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: proact_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - proact_network

volumes:
  db_data:

networks:
  proact_network:
    driver: bridge
