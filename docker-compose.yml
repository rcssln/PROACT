services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proact_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    networks:
      - proact_network
    ports:
      - "4000:4000"
    volumes:
      - rdrrmc-volume:/app/uploads


  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: proact_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - proact_network

volumes:
  db_data:
  rdrrmc-volume:

networks:
  proact_network:
    driver: bridge
