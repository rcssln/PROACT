version: '3.7'
services:
  postgres:
    image: postgres:15
    container_name: proact_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: proact
      POSTGRES_USER: proact_user
      POSTGRES_PASSWORD: proact_secret
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - proact_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proact_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
    networks:
      - proact_network
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://proact.dost1.ph/api}
    container_name: proact_frontend
    restart: unless-stopped
    ports:
      - "4001:80"
    depends_on:
      - backend
    networks:
      - proact_network

volumes:
  db_data:
networks:
  proact_network:
    driver: bridge