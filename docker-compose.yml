version: '3.7'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proact_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    networks:
      - proact_network
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads


  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://proact.dost1.ph/api}
    container_name: proact_frontend
    restart: unless-stopped
    ports:
      - "4001:80"
    depends_on:
      - backend
    networks:
      - proact_network

volumes:
  db_data:

networks:
  proact_network:
    driver: bridge
